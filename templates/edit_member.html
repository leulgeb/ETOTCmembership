{% extends "base.html" %}

{% block title %}Edit Member - ETOTC{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-body p-4">
                <h2 class="mb-4"><i class="bi bi-pencil"></i> Edit Member</h2>
                
                <form method="POST">
                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <label for="member_id" class="form-label">Member ID *</label>
                            <input type="text" class="form-control" id="member_id" name="member_id" 
                                   value="{{ member.id }}" required>
                            <small class="text-muted">Can be edited if needed</small>
                        </div>
                    </div>
                    
                    {% set first = member.first_name %}
                    {% set middle = member.middle_name or '' %}
                    {% set last = member.last_name %}
                    
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="first_name" class="form-label">First Name *</label>
                            <input type="text" class="form-control" id="first_name" name="first_name" value="{{ first }}" required>
                        </div>
                        
                        <div class="col-md-4 mb-3">
                            <label for="middle_name" class="form-label">Middle Name</label>
                            <input type="text" class="form-control" id="middle_name" name="middle_name" value="{{ middle }}">
                        </div>
                        
                        <div class="col-md-4 mb-3">
                            <label for="last_name" class="form-label">Last Name *</label>
                            <input type="text" class="form-control" id="last_name" name="last_name" value="{{ last }}" required>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="phone" class="form-label">Phone Number *</label>
                            <input type="tel" class="form-control" id="phone" name="phone" value="{{ member.phone }}" required>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label">Email Address *</label>
                            <input type="email" class="form-control" id="email" name="email" value="{{ member.email }}" required>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="monthly_payment" class="form-label">Monthly Payment * (Min: $30)</label>
                            <input type="number" class="form-control" id="monthly_payment" name="monthly_payment" 
                                   step="0.01" min="30" value="{{ member.monthly_payment }}" required>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <label class="form-label">Marital Status *</label><br>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="marital_status" id="single" value="single" {% if member.marital_status == 'single' %}checked{% endif %}>
                                <label class="form-check-label" for="single">Single</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="marital_status" id="single_with_children" value="single_with_children" {% if member.marital_status == 'single_with_children' %}checked{% endif %}>
                                <label class="form-check-label" for="single_with_children">Single with Children</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="marital_status" id="married" value="married" {% if member.marital_status == 'married' %}checked{% endif %}>
                                <label class="form-check-label" for="married">Married</label>
                            </div>
                        </div>
                    </div>
                    
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle"></i> Update Member
                        </button>
                        <a href="{{ url_for('admin_home') }}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
