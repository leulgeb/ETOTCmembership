{% extends "base.html" %}

{% block title %}Year {{ year }} Certificate - {{ member.name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12">
        <div class="card">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-center mb-3 d-print-none">
                    <a href="{{ url_for('admin_member_transactions', member_id=member.id) }}" class="btn btn-secondary">
                        <i class="bi bi-arrow-left"></i> Back
                    </a>
                    <button onclick="window.print()" class="btn btn-primary">
                        <i class="bi bi-printer"></i> Print Certificate
                    </button>
                </div>

                <div id="printableCertificate">
                    {{ certificate_html|safe }}
                </div>
            </div>
        </div>
    </div>
</div>

<style>
@media print {
    .d-print-none {
        display: none !important;
    }
    .card {
        border: none !important;
        box-shadow: none !important;
    }
    body {
        margin: 0 !important;
        padding: 0 !important;
    }
}
</style>
{% endblock %}
